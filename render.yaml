services:
  - type: web
    name: vehicle-scheduling
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install gunicorn flask-login
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: vehicle-scheduling-secret-2026-uae
